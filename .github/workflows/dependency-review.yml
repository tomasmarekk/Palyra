name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Check dependency graph availability
        id: dependency-graph
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.security_and_analysis.dependency_graph.status // "unknown"')
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "Dependency graph status: ${status}"

      - name: Dependency review
        if: steps.dependency-graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803

      - name: Dependency review skipped
        if: steps.dependency-graph.outputs.status != 'enabled'
        run: |
          echo "Dependency review skipped because dependency graph is not enabled for this repository."
