name: Dependency Review

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Check dependency graph availability
        id: dependency-graph
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(gh api "repos/${GITHUB_REPOSITORY}" --jq '.security_and_analysis.dependency_graph.status // "unknown"')
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          echo "Dependency graph status: ${status}"

      - name: Dependency review
        if: steps.dependency-graph.outputs.status == 'enabled'
        uses: actions/dependency-review-action@3c4e3dcb1aa7874d2c16be7d79418e9b7efd6261

      - name: Dependency review skipped
        if: steps.dependency-graph.outputs.status != 'enabled'
        run: |
          echo "Dependency review skipped because dependency graph is not enabled for this repository."
