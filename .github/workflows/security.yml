name: Security Gates

on:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  security-gates:
    name: Supply chain and secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx

      - name: Install osv-scanner
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/google/osv-scanner/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check

      - name: OSV scan
        run: |
          mkdir -p security-artifacts
          osv-scanner scan -L Cargo.lock --format json --output security-artifacts/osv-results.json

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: High-risk pattern scan
        run: bash scripts/check-high-risk-patterns.sh

      - name: Generate SBOM
        run: cargo cyclonedx --format json --override-filename sbom

      - name: Collect SBOM files
        run: |
          mkdir -p security-artifacts
          mapfile -t sbom_files < <(find . -type f -name 'sbom*.json' -not -path './security-artifacts/*')
          if [ "${#sbom_files[@]}" -eq 0 ]; then
            echo "No SBOM files generated by cargo cyclonedx." >&2
            exit 1
          fi
          for file in "${sbom_files[@]}"; do
            artifact_name="$(echo "${file#./}" | tr '/' '_')"
            cp "$file" "security-artifacts/$artifact_name"
          done

      - name: Generate build attestation placeholder
        run: bash scripts/generate-attestation-placeholder.sh security-artifacts/attestation-placeholder.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts-${{ github.run_id }}
          path: security-artifacts/
          if-no-files-found: error
