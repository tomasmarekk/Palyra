name: Security Gates

on:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  security-gates:
    name: Supply chain and secret scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: ${{ hashFiles('apps/web/package-lock.json') != '' }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        if: ${{ hashFiles('apps/web/package-lock.json') != '' }}
        run: npm --prefix apps/web ci

      - name: npm audit (high)
        if: ${{ hashFiles('apps/web/package-lock.json') != '' }}
        run: npm --prefix apps/web audit --audit-level=high --omit=dev

      - name: Collect npm audit reports (runtime + full)
        if: ${{ hashFiles('apps/web/package-lock.json') != '' }}
        run: |
          mkdir -p security-artifacts
          npm --prefix apps/web audit --json --omit=dev > security-artifacts/npm-audit-runtime.json || true
          npm --prefix apps/web audit --json > security-artifacts/npm-audit-full.json || true

      - name: Validate dev-only npm advisories allowlist
        if: ${{ hashFiles('apps/web/package-lock.json') != '' }}
        run: |
          node scripts/validate-npm-audit-dev-allowlist.mjs \
            --full security-artifacts/npm-audit-full.json \
            --runtime security-artifacts/npm-audit-runtime.json \
            --allowlist npm-audit-dev-allowlist.json \
            --summary security-artifacts/npm-audit-dev-summary.json \
            --threshold high

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.90.0

      - name: Install cargo-audit
        run: cargo install --locked cargo-audit --version 0.22.1

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny --version 0.19.0

      - name: Install cargo-cyclonedx
        run: cargo install --locked cargo-cyclonedx --version 0.5.7

      - name: Install osv-scanner
        run: |
          OSV_VERSION="v2.2.2"
          OSV_SHA256="c799274b682e0437c802d4714a136ad09b39c65547c460049ba5358d28afa576"
          mkdir -p "$HOME/.local/bin"
          curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused --location --silent --show-error --fail \
            "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64" \
            -o "$HOME/.local/bin/osv-scanner"
          echo "${OSV_SHA256}  $HOME/.local/bin/osv-scanner" | sha256sum --check -
          chmod +x "$HOME/.local/bin/osv-scanner"
          "$HOME/.local/bin/osv-scanner" --version
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check

      - name: OSV scan
        run: |
          mkdir -p security-artifacts
          osv-scanner scan --config osv-scanner.toml -L Cargo.lock --format json --output security-artifacts/osv-results.json

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: High-risk pattern scan
        run: bash scripts/check-high-risk-patterns.sh

      - name: Generate SBOM
        run: cargo cyclonedx --format json --override-filename sbom

      - name: Collect SBOM files
        run: |
          mkdir -p security-artifacts
          mapfile -t sbom_files < <(find . -type f -name 'sbom*.json' -not -path './security-artifacts/*')
          if [ "${#sbom_files[@]}" -eq 0 ]; then
            echo "No SBOM files generated by cargo cyclonedx." >&2
            exit 1
          fi
          for file in "${sbom_files[@]}"; do
            artifact_name="$(echo "${file#./}" | tr '/' '_')"
            cp "$file" "security-artifacts/$artifact_name"
          done

      - name: Generate build attestation placeholder
        run: bash scripts/generate-attestation-placeholder.sh security-artifacts/attestation-placeholder.json

      - name: Upload security artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: security-artifacts-${{ github.run_id }}
          path: security-artifacts/
          if-no-files-found: error
