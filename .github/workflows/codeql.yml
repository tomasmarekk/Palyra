name: CodeQL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Weekly scan (UTC). Adjust as desired.
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  analyze:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ "actions", "javascript-typescript", "rust" ]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        if: matrix.language == 'rust'
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@0e9f55954318745b37b7933c693bc093f7336125
        with:
          languages: ${{ matrix.language }}
          config-file: ./.github/codeql/codeql-config.yml
          # For Rust and other compiled languages, CodeQL supports build-mode: none.
          # (No build step required; keep CI lightweight.)
          build-mode: none

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@0e9f55954318745b37b7933c693bc093f7336125
