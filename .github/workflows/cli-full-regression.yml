name: CLI full regression

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  workflow-regression:
    name: Workflow regression matrix
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Run workflow regression matrix
        run: bash scripts/test/run-workflow-regression.sh

  release-smoke:
    name: Release packaging smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run release packaging smoke
        shell: pwsh
        run: ./scripts/test/run-release-smoke.ps1

      - name: Upload release smoke artifacts on failure
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-smoke-${{ matrix.os }}
          path: target/release-artifacts/smoke
          if-no-files-found: ignore
