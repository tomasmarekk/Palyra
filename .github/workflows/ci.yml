name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Cargo build
        run: cargo build --workspace --locked

      - name: Cargo test
        run: cargo test --workspace --locked

  quality:
    name: Formatting and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Enforce pinned GitHub Actions
        run: bash scripts/check-gh-actions-pinned.sh

      - name: Guard vendored artifacts
        run: bash scripts/check-no-vendored-artifacts.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Rustfmt check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  protocol-contracts:
    name: Protocol contracts (Rust + Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.90.0

      - name: Install protocol tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler default-jdk kotlin

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Rust stubs
        run: bash scripts/protocol/validate-rust-stubs.sh

      - name: Validate Kotlin stubs
        run: bash scripts/protocol/validate-kotlin-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-swift:
    name: Protocol stubs (Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Swift stubs
        run: bash scripts/protocol/validate-swift-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-windows:
    name: Protocol contracts (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.90.0

      - name: Install protobuf compiler
        run: choco install protoc --yes --no-progress

      - name: Validate protobuf schemas
        run: ./scripts/protocol/validate-proto.ps1

      - name: Generate protocol stubs
        run: ./scripts/protocol/generate-stubs.ps1

      - name: Validate Rust stubs
        run: ./scripts/protocol/validate-rust-stubs.ps1

      - name: Verify generated stubs are up to date
        run: ./scripts/protocol/check-generated-stubs.ps1

  web-lint:
    name: Web lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Lint web app
        run: npm --prefix apps/web run lint

  security:
    name: Security checks
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
    secrets: inherit
