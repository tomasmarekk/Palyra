name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Build desktop UI
        shell: pwsh
        run: ./scripts/test/ensure-desktop-ui.ps1

      - name: Cargo build
        run: cargo build --workspace --locked

      - name: Cargo test
        run: cargo test --workspace --locked

  desktop-linux-release-regression:
    name: Desktop Linux release regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build desktop UI
        shell: pwsh
        run: ./scripts/test/ensure-desktop-ui.ps1

      - name: Cargo test (desktop, release)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --release --locked

  release-packaging-smoke:
    name: Release packaging smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run release packaging smoke
        shell: pwsh
        run: ./scripts/test/run-release-smoke.ps1

  deterministic-core:
    name: Deterministic core suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run deterministic core suite
        run: bash scripts/test/run-deterministic-core.sh

  performance-smoke:
    name: Performance smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run performance smoke suite
        run: bash scripts/test/run-performance-smoke.sh

  quality:
    name: Formatting and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Enforce pinned GitHub Actions
        run: bash scripts/check-gh-actions-pinned.sh

      - name: Guard vendored artifacts
        run: bash scripts/check-no-vendored-artifacts.sh

      - name: Guard runtime artifacts
        run: bash scripts/check-runtime-artifacts.sh

      - name: Guard local-only tracked paths
        run: bash scripts/check-local-only-tracked-files.sh

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Vite+ check
        run: vp check apps/web apps/desktop/ui apps/browser-extension scripts

      - name: Rustfmt check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  protocol-contracts:
    name: Protocol contracts (Rust + Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0

      - name: Install protocol tooling
        run: |
          missing_packages=()
          if ! command -v protoc >/dev/null 2>&1; then
            missing_packages+=(protobuf-compiler)
          fi
          if ! command -v javac >/dev/null 2>&1; then
            missing_packages+=(default-jdk)
          fi
          if ! command -v kotlinc >/dev/null 2>&1; then
            missing_packages+=(kotlin)
          fi
          if [ "${#missing_packages[@]}" -eq 0 ]; then
            echo "Protocol tooling already available on runner."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y "${missing_packages[@]}"

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Rust stubs
        run: bash scripts/protocol/validate-rust-stubs.sh

      - name: Validate Kotlin stubs
        run: bash scripts/protocol/validate-kotlin-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-swift:
    name: Protocol stubs (Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Swift stubs
        run: bash scripts/protocol/validate-swift-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-windows:
    name: Protocol contracts (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: 1.91.0

      - name: Install protobuf compiler
        run: ./scripts/protocol/install-protoc-windows.ps1

      - name: Validate protobuf schemas
        run: ./scripts/protocol/validate-proto.ps1

      - name: Generate protocol stubs
        run: ./scripts/protocol/generate-stubs.ps1

      - name: Validate Rust stubs
        run: ./scripts/protocol/validate-rust-stubs.ps1

      - name: Verify generated stubs are up to date
        run: ./scripts/protocol/check-generated-stubs.ps1

  web-lint:
    name: Web lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Run web Vite+ CI task
        run: vp run web:ci

  web-cleanroom:
    name: Web clean-room (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@1bc2c0c101cb14b233d41d9f113658852e3ba658
        with:
          node-version-file: .node-version
          cache: true

      - name: Reinstall root workspace from clean checkout
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item -LiteralPath node_modules -Recurse -Force
          }
          vp install

      - name: Run clean-room web validation
        run: vp run web:ci

  security:
    name: Security checks
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
    secrets: inherit
