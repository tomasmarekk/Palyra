name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Build desktop UI
        shell: pwsh
        run: ./scripts/test/ensure-desktop-ui.ps1

      - name: Cargo build
        run: cargo build --workspace --locked

      - name: Cargo test
        run: cargo test --workspace --locked

  desktop-linux-release-regression:
    name: Desktop Linux release regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build desktop UI
        shell: pwsh
        run: ./scripts/test/ensure-desktop-ui.ps1

      - name: Cargo test (desktop, release)
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml --release --locked

  deterministic-core:
    name: Deterministic core suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run deterministic core suite
        run: bash scripts/test/run-deterministic-core.sh

  critical-attack-scenarios:
    name: Critical attack scenarios
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Run critical attack scenarios
        run: bash scripts/test/run-critical-attack-scenarios.sh

  workflow-regression:
    name: Workflow regression matrix
    runs-on: ubuntu-latest
    env:
      PALYRA_WORKFLOW_REGRESSION_PROFILE: fast
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Run workflow regression matrix
        run: bash scripts/test/run-workflow-regression.sh

      - name: Upload workflow regression artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: workflow-regression-fast
          path: target/release-artifacts/workflow-regression
          if-no-files-found: error

  performance-smoke:
    name: Performance smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Install desktop Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Run performance smoke suite
        run: bash scripts/test/run-performance-smoke.sh

  quality:
    name: Formatting and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 2

      - name: Enforce pinned GitHub Actions
        run: bash scripts/check-gh-actions-pinned.sh

      - name: Guard vendored artifacts
        run: bash scripts/check-no-vendored-artifacts.sh

      - name: Guard runtime artifacts
        run: bash scripts/check-runtime-artifacts.sh

      - name: Guard local-only tracked paths
        run: bash scripts/check-local-only-tracked-files.sh

      - name: Module budget and connector boundary checks
        run: bash scripts/dev/report-module-budgets.sh --strict

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Vite+ check
        run: vp check apps/web apps/desktop/ui apps/browser-extension scripts

      - name: Rustfmt check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  cli-parity:
    name: CLI parity acceptance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Generate CLI parity report
        run: cargo run -p palyra-cli --example render_cli_parity_report --locked -- crates/palyra-cli/tests/cli_parity_matrix.toml artifacts/cli-parity-acceptance-matrix.md

      - name: Validate CLI parity acceptance
        run: cargo test -p palyra-cli --test cli_parity --test help_snapshots --locked

      - name: Upload CLI parity artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: cli-parity-acceptance-matrix
          path: artifacts/cli-parity-acceptance-matrix.md

  protocol-contracts:
    name: Protocol contracts (Rust + Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Install protocol tooling
        run: |
          missing_packages=()
          if ! command -v protoc >/dev/null 2>&1; then
            missing_packages+=(protobuf-compiler)
          fi
          if ! command -v javac >/dev/null 2>&1; then
            missing_packages+=(default-jdk)
          fi
          if ! command -v kotlinc >/dev/null 2>&1; then
            missing_packages+=(kotlin)
          fi
          if [ "${#missing_packages[@]}" -eq 0 ]; then
            echo "Protocol tooling already available on runner."
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y "${missing_packages[@]}"

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Rust stubs
        run: bash scripts/protocol/validate-rust-stubs.sh

      - name: Validate Kotlin stubs
        run: bash scripts/protocol/validate-kotlin-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-swift:
    name: Protocol stubs (Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Swift stubs
        run: bash scripts/protocol/validate-swift-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-windows:
    name: Protocol contracts (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Install Rust toolchain
        uses: ./.github/actions/setup-rust-toolchain
        with:
          toolchain: 1.91.0

      - name: Install protobuf compiler
        run: ./scripts/protocol/install-protoc-windows.ps1

      - name: Validate protobuf schemas
        run: ./scripts/protocol/validate-proto.ps1

      - name: Generate protocol stubs
        run: ./scripts/protocol/generate-stubs.ps1

      - name: Validate Rust stubs
        run: ./scripts/protocol/validate-rust-stubs.ps1

      - name: Verify generated stubs are up to date
        run: ./scripts/protocol/check-generated-stubs.ps1

  web-lint:
    name: Web lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true
          run-install: true

      - name: Run web Vite+ CI task
        run: vp run web:ci

  web-cleanroom:
    name: Web clean-room (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Vite+
        uses: ./.github/actions/setup-vp-safe
        with:
          node-version-file: .node-version
          cache: true

      - name: Reinstall root workspace from clean checkout
        shell: pwsh
        run: |
          if (Test-Path node_modules) {
            Remove-Item -LiteralPath node_modules -Recurse -Force
          }
          vp install

      - name: Run clean-room web validation
        run: vp run web:ci

  security:
    name: Security checks
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
    secrets: inherit
