name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Cargo build
        run: cargo build --workspace --locked

      - name: Cargo test
        run: cargo test --workspace --locked

  quality:
    name: Formatting and lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0
          components: rustfmt, clippy

      - name: Rustfmt check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  protocol-contracts:
    name: Protocol contracts (Rust + Kotlin)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.90.0

      - name: Install protocol tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler default-jdk kotlin

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Rust stubs
        run: bash scripts/protocol/validate-rust-stubs.sh

      - name: Validate Kotlin stubs
        run: bash scripts/protocol/validate-kotlin-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  protocol-swift:
    name: Protocol stubs (Swift)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install protobuf compiler
        run: brew install protobuf

      - name: Validate protobuf schemas
        run: bash scripts/protocol/validate-proto.sh

      - name: Generate protocol stubs
        run: bash scripts/protocol/generate-stubs.sh

      - name: Validate Swift stubs
        run: bash scripts/protocol/validate-swift-stubs.sh

      - name: Verify generated stubs are up to date
        run: bash scripts/protocol/check-generated-stubs.sh

  security:
    name: Security checks
    uses: ./.github/workflows/security.yml
    permissions:
      contents: read
    secrets: inherit
