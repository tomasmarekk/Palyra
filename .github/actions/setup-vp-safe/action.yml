name: Setup Vite+ Safe
description: Install Vite+ via the pinned upstream action and guarantee a working vp CLI on PATH.

inputs:
  node-version-file:
    description: Path to the Node version file.
    required: false
  cache:
    description: Whether to enable setup-vp caching.
    required: false
    default: "true"
  run-install:
    description: Whether setup-vp should run install automatically.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup Node.js with npm cache
      if: ${{ inputs.cache == 'true' }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version-file: ${{ inputs.node-version-file }}
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Setup Node.js without cache
      if: ${{ inputs.cache != 'true' }}
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Ensure Vite+ CLI
      shell: pwsh
      run: ./scripts/ci/ensure-vp.ps1

    - name: Install workspace dependencies
      if: ${{ inputs.run-install == 'true' }}
      shell: pwsh
      run: vp install
