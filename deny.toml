[graph]
targets = []
all-features = true

[advisories]
version = 2
ignore = [
  # rustls-pemfile is a transitive dependency (via reqwest/rustls stack) with no drop-in
  # maintained replacement in current upstream graph; tracked until dependency chain migrates.
  "RUSTSEC-2025-0134",
]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
]
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
