syntax = "proto3";

package palyra.browser.v1;

import "palyra/v1/common.proto";

service BrowserService {
  rpc Health(BrowserHealthRequest) returns (BrowserHealthResponse);
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc CloseSession(CloseSessionRequest) returns (CloseSessionResponse);
  rpc Navigate(NavigateRequest) returns (NavigateResponse);
  rpc Click(ClickRequest) returns (ClickResponse);
  rpc Type(TypeRequest) returns (TypeResponse);
  rpc Scroll(ScrollRequest) returns (ScrollResponse);
  rpc WaitFor(WaitForRequest) returns (WaitForResponse);
  rpc GetTitle(GetTitleRequest) returns (GetTitleResponse);
  rpc Screenshot(ScreenshotRequest) returns (ScreenshotResponse);
  rpc Observe(ObserveRequest) returns (ObserveResponse);
  rpc NetworkLog(NetworkLogRequest) returns (NetworkLogResponse);
  rpc ResetState(ResetStateRequest) returns (ResetStateResponse);
  rpc ListTabs(ListTabsRequest) returns (ListTabsResponse);
  rpc OpenTab(OpenTabRequest) returns (OpenTabResponse);
  rpc SwitchTab(SwitchTabRequest) returns (SwitchTabResponse);
  rpc CloseTab(CloseTabRequest) returns (CloseTabResponse);
  rpc GetPermissions(GetPermissionsRequest) returns (GetPermissionsResponse);
  rpc SetPermissions(SetPermissionsRequest) returns (SetPermissionsResponse);
}

message BrowserHealthRequest {
  uint32 v = 1;
  reserved 2 to 10;
}

message BrowserHealthResponse {
  uint32 v = 1;
  string status = 2;
  uint64 uptime_seconds = 3;
  uint32 active_sessions = 4;
  reserved 5 to 12;
}

message SessionBudget {
  uint64 max_navigation_timeout_ms = 1;
  uint64 max_session_lifetime_ms = 2;
  uint64 max_screenshot_bytes = 3;
  uint64 max_response_bytes = 4;
  uint64 max_action_timeout_ms = 5;
  uint64 max_type_input_bytes = 6;
  uint64 max_actions_per_session = 7;
  uint64 max_actions_per_window = 8;
  uint64 action_rate_window_ms = 9;
  uint64 max_action_log_entries = 10;
  uint64 max_observe_snapshot_bytes = 13;
  uint64 max_visible_text_bytes = 14;
  uint64 max_network_log_entries = 15;
  uint64 max_network_log_bytes = 16;

  reserved 11 to 12;
}

message CreateSessionRequest {
  uint32 v = 1;
  string principal = 2;
  uint64 idle_ttl_ms = 3;
  SessionBudget budget = 4;
  bool allow_private_targets = 5;
  bool allow_downloads = 6;
  repeated string action_allowed_domains = 7;
  bool persistence_enabled = 15;
  string persistence_id = 16;
  string channel = 17;

  reserved 8 to 14;
}

message CreateSessionResponse {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  uint64 created_at_unix_ms = 3;
  SessionBudget effective_budget = 4;
  bool downloads_enabled = 5;
  repeated string action_allowed_domains = 6;
  bool persistence_enabled = 13;
  string persistence_id = 14;
  bool state_restored = 15;

  reserved 7 to 12;
}

message CloseSessionRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;

  reserved 3 to 10;
}

message CloseSessionResponse {
  uint32 v = 1;
  bool closed = 2;
  string reason = 3;

  reserved 4 to 12;
}

message NavigateRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  string url = 3;
  uint64 timeout_ms = 4;
  bool allow_redirects = 5;
  uint32 max_redirects = 6;
  bool allow_private_targets = 7;

  reserved 8 to 14;
}

message NavigateResponse {
  uint32 v = 1;
  bool success = 2;
  string final_url = 3;
  uint32 status_code = 4;
  string title = 5;
  uint64 body_bytes = 6;
  uint64 latency_ms = 7;
  string error = 8;

  reserved 9 to 14;
}

message BrowserActionLogEntry {
  uint32 v = 1;
  string action_id = 2;
  string action_name = 3;
  string selector = 4;
  bool success = 5;
  string outcome = 6;
  string error = 7;
  uint64 started_at_unix_ms = 8;
  uint64 completed_at_unix_ms = 9;
  uint32 attempts = 10;
  string page_url = 11;

  reserved 12 to 16;
}

message ClickRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  string selector = 3;
  uint32 max_retries = 4;
  uint64 timeout_ms = 5;
  bool capture_failure_screenshot = 6;
  uint64 max_failure_screenshot_bytes = 7;

  reserved 8 to 14;
}

message ClickResponse {
  uint32 v = 1;
  bool success = 2;
  string error = 3;
  BrowserActionLogEntry action_log = 4;
  bytes failure_screenshot_bytes = 5;
  string failure_screenshot_mime_type = 6;

  reserved 7 to 12;
}

message TypeRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  string selector = 3;
  string text = 4;
  bool clear_existing = 5;
  uint64 timeout_ms = 6;
  bool capture_failure_screenshot = 7;
  uint64 max_failure_screenshot_bytes = 8;

  reserved 9 to 16;
}

message TypeResponse {
  uint32 v = 1;
  bool success = 2;
  uint64 typed_bytes = 3;
  string error = 4;
  BrowserActionLogEntry action_log = 5;
  bytes failure_screenshot_bytes = 6;
  string failure_screenshot_mime_type = 7;

  reserved 8 to 14;
}

message ScrollRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  int64 delta_x = 3;
  int64 delta_y = 4;
  bool capture_failure_screenshot = 5;
  uint64 max_failure_screenshot_bytes = 6;

  reserved 7 to 14;
}

message ScrollResponse {
  uint32 v = 1;
  bool success = 2;
  int64 scroll_x = 3;
  int64 scroll_y = 4;
  string error = 5;
  BrowserActionLogEntry action_log = 6;
  bytes failure_screenshot_bytes = 7;
  string failure_screenshot_mime_type = 8;

  reserved 9 to 14;
}

message WaitForRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  string selector = 3;
  string text = 4;
  uint64 timeout_ms = 5;
  uint64 poll_interval_ms = 6;
  bool capture_failure_screenshot = 7;
  uint64 max_failure_screenshot_bytes = 8;

  reserved 9 to 16;
}

message WaitForResponse {
  uint32 v = 1;
  bool success = 2;
  uint64 waited_ms = 3;
  string error = 4;
  BrowserActionLogEntry action_log = 5;
  bytes failure_screenshot_bytes = 6;
  string failure_screenshot_mime_type = 7;
  string matched_selector = 8;
  string matched_text = 9;

  reserved 10 to 16;
}

message GetTitleRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  uint64 max_title_bytes = 3;

  reserved 4 to 10;
}

message GetTitleResponse {
  uint32 v = 1;
  bool success = 2;
  string title = 3;
  string error = 4;

  reserved 5 to 10;
}

message ScreenshotRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  uint64 max_bytes = 3;
  string format = 4;

  reserved 5 to 12;
}

message ScreenshotResponse {
  uint32 v = 1;
  bool success = 2;
  bytes image_bytes = 3;
  string mime_type = 4;
  string error = 5;

  reserved 6 to 12;
}

message ObserveRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  bool include_dom_snapshot = 3;
  bool include_accessibility_tree = 4;
  bool include_visible_text = 5;
  uint64 max_dom_snapshot_bytes = 6;
  uint64 max_accessibility_tree_bytes = 7;
  uint64 max_visible_text_bytes = 8;

  reserved 9 to 14;
}

message ObserveResponse {
  uint32 v = 1;
  bool success = 2;
  string dom_snapshot = 3;
  string accessibility_tree = 4;
  string visible_text = 5;
  bool dom_truncated = 6;
  bool accessibility_tree_truncated = 7;
  bool visible_text_truncated = 8;
  string page_url = 9;
  string error = 10;

  reserved 11 to 16;
}

message NetworkLogRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  uint32 limit = 3;
  bool include_headers = 4;
  uint64 max_payload_bytes = 5;

  reserved 6 to 12;
}

message NetworkLogHeader {
  uint32 v = 1;
  string name = 2;
  string value = 3;

  reserved 4 to 8;
}

message NetworkLogEntry {
  uint32 v = 1;
  string request_url = 2;
  uint32 status_code = 3;
  string timing_bucket = 4;
  uint64 latency_ms = 5;
  uint64 captured_at_unix_ms = 6;
  repeated NetworkLogHeader headers = 7;

  reserved 8 to 12;
}

message NetworkLogResponse {
  uint32 v = 1;
  bool success = 2;
  repeated NetworkLogEntry entries = 3;
  bool truncated = 4;
  string error = 5;

  reserved 6 to 12;
}

enum PermissionSetting {
  PERMISSION_SETTING_UNSPECIFIED = 0;
  PERMISSION_SETTING_DENY = 1;
  PERMISSION_SETTING_ALLOW = 2;
}

message SessionPermissions {
  uint32 v = 1;
  PermissionSetting camera = 2;
  PermissionSetting microphone = 3;
  PermissionSetting location = 4;

  reserved 5 to 12;
}

message BrowserTab {
  uint32 v = 1;
  palyra.common.v1.CanonicalId tab_id = 2;
  string url = 3;
  string title = 4;
  bool active = 5;

  reserved 6 to 12;
}

message ResetStateRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  bool clear_cookies = 3;
  bool clear_storage = 4;
  bool reset_tabs = 5;
  bool reset_permissions = 6;

  reserved 7 to 14;
}

message ResetStateResponse {
  uint32 v = 1;
  bool success = 2;
  uint32 cookies_cleared = 3;
  uint32 storage_entries_cleared = 4;
  uint32 tabs_closed = 5;
  SessionPermissions permissions = 6;
  string error = 7;

  reserved 8 to 14;
}

message ListTabsRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;

  reserved 3 to 10;
}

message ListTabsResponse {
  uint32 v = 1;
  bool success = 2;
  repeated BrowserTab tabs = 3;
  palyra.common.v1.CanonicalId active_tab_id = 4;
  string error = 5;

  reserved 6 to 12;
}

message OpenTabRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  string url = 3;
  bool activate = 4;
  uint64 timeout_ms = 5;
  bool allow_redirects = 6;
  uint32 max_redirects = 7;
  bool allow_private_targets = 8;

  reserved 9 to 14;
}

message OpenTabResponse {
  uint32 v = 1;
  bool success = 2;
  BrowserTab tab = 3;
  bool navigated = 4;
  uint32 status_code = 5;
  string error = 6;

  reserved 7 to 14;
}

message SwitchTabRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  palyra.common.v1.CanonicalId tab_id = 3;

  reserved 4 to 10;
}

message SwitchTabResponse {
  uint32 v = 1;
  bool success = 2;
  BrowserTab active_tab = 3;
  string error = 4;

  reserved 5 to 12;
}

message CloseTabRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  palyra.common.v1.CanonicalId tab_id = 3;

  reserved 4 to 10;
}

message CloseTabResponse {
  uint32 v = 1;
  bool success = 2;
  palyra.common.v1.CanonicalId closed_tab_id = 3;
  BrowserTab active_tab = 4;
  uint32 tabs_remaining = 5;
  string error = 6;

  reserved 7 to 14;
}

message GetPermissionsRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;

  reserved 3 to 10;
}

message GetPermissionsResponse {
  uint32 v = 1;
  bool success = 2;
  SessionPermissions permissions = 3;
  string error = 4;

  reserved 5 to 12;
}

message SetPermissionsRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  PermissionSetting camera = 3;
  PermissionSetting microphone = 4;
  PermissionSetting location = 5;
  bool reset_to_default = 6;

  reserved 7 to 14;
}

message SetPermissionsResponse {
  uint32 v = 1;
  bool success = 2;
  SessionPermissions permissions = 3;
  string error = 4;

  reserved 5 to 12;
}
