syntax = "proto3";

package palyra.gateway.v1;

import "palyra/v1/common.proto";

service GatewayService {
  rpc GetHealth(HealthRequest) returns (HealthResponse);
  rpc RunStream(stream palyra.common.v1.RunStreamRequest)
      returns (stream palyra.common.v1.RunStreamEvent);
  rpc AppendEvent(AppendEventRequest) returns (AppendEventResponse);
  rpc AbortRun(AbortRunRequest) returns (AbortRunResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc ResolveSession(ResolveSessionRequest) returns (ResolveSessionResponse);
  rpc RouteMessage(RouteMessageRequest) returns (RouteMessageResponse);
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse);
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse);
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse);
  rpc SetDefaultAgent(SetDefaultAgentRequest) returns (SetDefaultAgentResponse);
  rpc ResolveAgentForContext(ResolveAgentForContextRequest)
      returns (ResolveAgentForContextResponse);
}

service ApprovalsService {
  rpc ListApprovals(ListApprovalsRequest) returns (ListApprovalsResponse);
  rpc GetApproval(GetApprovalRequest) returns (GetApprovalResponse);
  rpc ExportApprovals(ExportApprovalsRequest) returns (stream ExportApprovalsResponse);
}

service VaultService {
  rpc PutSecret(PutSecretRequest) returns (PutSecretResponse);
  rpc GetSecret(GetSecretRequest) returns (GetSecretResponse);
  rpc DeleteSecret(DeleteSecretRequest) returns (DeleteSecretResponse);
  rpc ListSecrets(ListSecretsRequest) returns (ListSecretsResponse);
}

service CanvasService {
  rpc CreateCanvas(CreateCanvasRequest) returns (CreateCanvasResponse);
  rpc UpdateCanvas(UpdateCanvasRequest) returns (UpdateCanvasResponse);
  rpc CloseCanvas(CloseCanvasRequest) returns (CloseCanvasResponse);
  rpc GetCanvas(GetCanvasRequest) returns (GetCanvasResponse);
}

enum ApprovalSubjectType {
  APPROVAL_SUBJECT_TYPE_UNSPECIFIED = 0;
  APPROVAL_SUBJECT_TYPE_TOOL = 1;
  APPROVAL_SUBJECT_TYPE_CHANNEL_SEND = 2;
  APPROVAL_SUBJECT_TYPE_SECRET_ACCESS = 3;
  APPROVAL_SUBJECT_TYPE_BROWSER_ACTION = 4;
  APPROVAL_SUBJECT_TYPE_NODE_CAPABILITY = 5;
}

enum ApprovalDecision {
  APPROVAL_DECISION_UNSPECIFIED = 0;
  APPROVAL_DECISION_ALLOW = 1;
  APPROVAL_DECISION_DENY = 2;
  APPROVAL_DECISION_TIMEOUT = 3;
  APPROVAL_DECISION_ERROR = 4;
}

enum ApprovalExportFormat {
  APPROVAL_EXPORT_FORMAT_UNSPECIFIED = 0;
  APPROVAL_EXPORT_FORMAT_NDJSON = 1;
  APPROVAL_EXPORT_FORMAT_JSON = 2;
}

message ApprovalPolicySnapshot {
  string policy_id = 1;
  string policy_hash = 2;
  string evaluation_summary = 3;

  reserved 4 to 10;
}

message ApprovalRecord {
  uint32 v = 1;
  palyra.common.v1.CanonicalId approval_id = 2;
  palyra.common.v1.CanonicalId session_id = 3;
  palyra.common.v1.CanonicalId run_id = 4;
  string principal = 5;
  string device_id = 6;
  string channel = 7;
  int64 requested_at_unix_ms = 8;
  int64 resolved_at_unix_ms = 9;
  ApprovalSubjectType subject_type = 10;
  string subject_id = 11;
  string request_summary = 12;
  ApprovalDecision decision = 13;
  palyra.common.v1.ApprovalDecisionScope decision_scope = 14;
  ApprovalPolicySnapshot policy_snapshot = 15;
  palyra.common.v1.ApprovalPrompt prompt = 16;
  string decision_reason = 17;
  int64 decision_scope_ttl_ms = 18;

  reserved 19 to 28;
}

message ListApprovalsRequest {
  uint32 v = 1;
  string after_approval_ulid = 2;
  uint32 limit = 3;
  int64 since_unix_ms = 4;
  int64 until_unix_ms = 5;
  string subject_id = 6;
  string principal = 7;
  ApprovalDecision decision = 8;
  ApprovalSubjectType subject_type = 9;

  reserved 10 to 16;
}

message ListApprovalsResponse {
  uint32 v = 1;
  repeated ApprovalRecord approvals = 2;
  string next_after_approval_ulid = 3;

  reserved 4 to 10;
}

message GetApprovalRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId approval_id = 2;

  reserved 3 to 10;
}

message GetApprovalResponse {
  uint32 v = 1;
  ApprovalRecord approval = 2;

  reserved 3 to 10;
}

message ExportApprovalsRequest {
  uint32 v = 1;
  ApprovalExportFormat format = 2;
  uint32 limit = 3;
  int64 since_unix_ms = 4;
  int64 until_unix_ms = 5;
  string subject_id = 6;
  string principal = 7;
  ApprovalDecision decision = 8;
  ApprovalSubjectType subject_type = 9;

  reserved 10 to 16;
}

message ExportApprovalsResponse {
  uint32 v = 1;
  bytes chunk = 2;
  uint32 chunk_seq = 3;
  bool done = 4;

  reserved 5 to 10;
}

message VaultSecretMetadata {
  string scope = 1;
  string key = 2;
  int64 created_at_unix_ms = 3;
  int64 updated_at_unix_ms = 4;
  uint32 value_bytes = 5;

  reserved 6 to 10;
}

message PutSecretRequest {
  uint32 v = 1;
  string scope = 2;
  string key = 3;
  bytes value = 4;

  reserved 5 to 12;
}

message PutSecretResponse {
  uint32 v = 1;
  VaultSecretMetadata secret = 2;

  reserved 3 to 10;
}

message GetSecretRequest {
  uint32 v = 1;
  string scope = 2;
  string key = 3;

  reserved 4 to 12;
}

message GetSecretResponse {
  uint32 v = 1;
  bytes value = 2;

  reserved 3 to 10;
}

message DeleteSecretRequest {
  uint32 v = 1;
  string scope = 2;
  string key = 3;

  reserved 4 to 12;
}

message DeleteSecretResponse {
  uint32 v = 1;
  bool deleted = 2;

  reserved 3 to 10;
}

message ListSecretsRequest {
  uint32 v = 1;
  string scope = 2;

  reserved 3 to 10;
}

message ListSecretsResponse {
  uint32 v = 1;
  repeated VaultSecretMetadata secrets = 2;

  reserved 3 to 10;
}

message CanvasAsset {
  string path = 1;
  string content_type = 2;
  bytes body = 3;

  reserved 4 to 10;
}

message CanvasBundle {
  string bundle_id = 1;
  string entrypoint_path = 2;
  repeated CanvasAsset assets = 3;
  string sha256 = 4;
  string signature = 5;

  reserved 6 to 12;
}

message Canvas {
  uint32 v = 1;
  palyra.common.v1.CanonicalId canvas_id = 2;
  palyra.common.v1.CanonicalId session_id = 3;
  string principal = 4;
  uint64 state_version = 5;
  bytes state_json = 6;
  CanvasBundle bundle = 7;
  repeated string allowed_parent_origins = 8;
  int64 created_at_unix_ms = 9;
  int64 updated_at_unix_ms = 10;
  int64 expires_at_unix_ms = 11;
  bool closed = 12;
  string close_reason = 13;

  reserved 14 to 24;
}

message CreateCanvasRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId canvas_id = 2;
  palyra.common.v1.CanonicalId session_id = 3;
  bytes initial_state_json = 4;
  uint64 initial_state_version = 5;
  CanvasBundle bundle = 6;
  repeated string allowed_parent_origins = 7;
  uint32 auth_token_ttl_seconds = 8;

  reserved 9 to 16;
}

message CreateCanvasResponse {
  uint32 v = 1;
  Canvas canvas = 2;
  string frame_url = 3;
  string runtime_url = 4;
  string auth_token = 5;

  reserved 6 to 12;
}

message UpdateCanvasRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId canvas_id = 2;
  bytes state_json = 3;
  uint64 expected_state_version = 4;

  reserved 5 to 12;
}

message UpdateCanvasResponse {
  uint32 v = 1;
  Canvas canvas = 2;

  reserved 3 to 10;
}

message CloseCanvasRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId canvas_id = 2;
  string reason = 3;

  reserved 4 to 10;
}

message CloseCanvasResponse {
  uint32 v = 1;
  palyra.common.v1.CanonicalId canvas_id = 2;
  bool closed = 3;
  string close_reason = 4;

  reserved 5 to 10;
}

message GetCanvasRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId canvas_id = 2;

  reserved 3 to 10;
}

message GetCanvasResponse {
  uint32 v = 1;
  Canvas canvas = 2;

  reserved 3 to 10;
}

message HealthRequest {
  uint32 v = 1;

  reserved 2 to 8;
}

message HealthResponse {
  uint32 v = 1;
  string service = 2;
  string status = 3;
  string version = 4;
  string git_hash = 5;
  string build_profile = 6;
  uint64 uptime_seconds = 7;

  reserved 8 to 16;
}

message AppendEventRequest {
  uint32 v = 1;
  palyra.common.v1.JournalEvent event = 2;

  reserved 3 to 12;
}

message AppendEventResponse {
  uint32 v = 1;
  palyra.common.v1.CanonicalId event_id = 2;
  bool accepted = 3;

  reserved 4 to 10;
}

message AbortRunRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId run_id = 2;
  string reason = 3;

  reserved 4 to 12;
}

message AbortRunResponse {
  uint32 v = 1;
  palyra.common.v1.CanonicalId run_id = 2;
  bool cancel_requested = 3;
  string reason = 4;

  reserved 5 to 12;
}

message SessionSummary {
  palyra.common.v1.CanonicalId session_id = 1;
  string session_key = 2;
  string session_label = 3;
  int64 created_at_unix_ms = 4;
  int64 updated_at_unix_ms = 5;
  palyra.common.v1.CanonicalId last_run_id = 6;

  reserved 7 to 16;
}

message ListSessionsRequest {
  uint32 v = 1;
  string after_session_key = 2;
  uint32 limit = 3;

  reserved 4 to 10;
}

message ListSessionsResponse {
  uint32 v = 1;
  repeated SessionSummary sessions = 2;
  string next_after_session_key = 3;

  reserved 4 to 10;
}

message ResolveSessionRequest {
  uint32 v = 1;
  palyra.common.v1.CanonicalId session_id = 2;
  string session_key = 3;
  string session_label = 4;
  bool require_existing = 5;
  bool reset_session = 6;

  reserved 7 to 16;
}

message ResolveSessionResponse {
  uint32 v = 1;
  SessionSummary session = 2;
  bool created = 3;
  bool reset_applied = 4;

  reserved 5 to 12;
}

message OutboundMessage {
  string text = 1;
  repeated palyra.common.v1.MessageAttachment attachments = 2;
  string thread_id = 3;
  string in_reply_to_message_id = 4;
  bool broadcast = 5;
  string auto_ack_text = 6;
  string auto_reaction = 7;

  reserved 8 to 16;
}

message RouteMessageRequest {
  uint32 v = 1;
  palyra.common.v1.MessageEnvelope envelope = 2;
  bool is_direct_message = 3;
  bool request_broadcast = 4;
  string adapter_message_id = 5;
  string adapter_thread_id = 6;
  uint32 retry_attempt = 7;
  string session_label = 8;

  reserved 9 to 16;
}

message RouteMessageResponse {
  uint32 v = 1;
  bool accepted = 2;
  bool queued_for_retry = 3;
  string decision_reason = 4;
  palyra.common.v1.CanonicalId session_id = 5;
  palyra.common.v1.CanonicalId run_id = 6;
  repeated OutboundMessage outputs = 7;
  string route_key = 8;
  uint32 retry_attempt = 9;
  uint32 queue_depth = 10;

  reserved 11 to 20;
}

message Agent {
  string agent_id = 1;
  string display_name = 2;
  string agent_dir = 3;
  repeated string workspace_roots = 4;
  string default_model_profile = 5;
  repeated string default_tool_allowlist = 6;
  repeated string default_skill_allowlist = 7;
  int64 created_at_unix_ms = 8;
  int64 updated_at_unix_ms = 9;

  reserved 10 to 16;
}

message ListAgentsRequest {
  uint32 v = 1;
  uint32 limit = 2;
  string after_agent_id = 3;

  reserved 4 to 10;
}

message ListAgentsResponse {
  uint32 v = 1;
  repeated Agent agents = 2;
  string default_agent_id = 3;
  string next_after_agent_id = 4;

  reserved 5 to 12;
}

message GetAgentRequest {
  uint32 v = 1;
  string agent_id = 2;

  reserved 3 to 10;
}

message GetAgentResponse {
  uint32 v = 1;
  Agent agent = 2;
  bool is_default = 3;

  reserved 4 to 10;
}

message CreateAgentRequest {
  uint32 v = 1;
  string agent_id = 2;
  string display_name = 3;
  string agent_dir = 4;
  repeated string workspace_roots = 5;
  string default_model_profile = 6;
  repeated string default_tool_allowlist = 7;
  repeated string default_skill_allowlist = 8;
  bool set_default = 9;
  bool allow_absolute_paths = 10;

  reserved 11 to 20;
}

message CreateAgentResponse {
  uint32 v = 1;
  Agent agent = 2;
  bool default_changed = 3;
  string default_agent_id = 4;

  reserved 5 to 10;
}

message SetDefaultAgentRequest {
  uint32 v = 1;
  string agent_id = 2;

  reserved 3 to 10;
}

message SetDefaultAgentResponse {
  uint32 v = 1;
  string previous_agent_id = 2;
  string default_agent_id = 3;

  reserved 4 to 10;
}

enum AgentResolutionSource {
  AGENT_RESOLUTION_SOURCE_UNSPECIFIED = 0;
  AGENT_RESOLUTION_SOURCE_SESSION_BINDING = 1;
  AGENT_RESOLUTION_SOURCE_DEFAULT = 2;
  AGENT_RESOLUTION_SOURCE_FALLBACK = 3;
}

message ResolveAgentForContextRequest {
  uint32 v = 1;
  string principal = 2;
  string channel = 3;
  palyra.common.v1.CanonicalId session_id = 4;
  string preferred_agent_id = 5;
  bool persist_session_binding = 6;

  reserved 7 to 14;
}

message ResolveAgentForContextResponse {
  uint32 v = 1;
  Agent agent = 2;
  AgentResolutionSource source = 3;
  bool binding_created = 4;
  bool is_default = 5;

  reserved 6 to 12;
}
