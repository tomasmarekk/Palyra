# Canonical security gate sequence for CI systems.
# GitHub Actions implementation: .github/workflows/security.yml
name: palyra-security-sdlc-baseline

stages:
  - name: dependency-audit
    checks:
      - cargo-audit
      - cargo-deny
      - osv-scanner
  - name: secret-scanning
    checks:
      - gitleaks
      - high-risk-pattern-scan
  - name: supply-chain-artifacts
    outputs:
      - cyclone-dx-sbom
      - build-attestation-placeholder
  - name: fuzzing
    strategy:
      - compile-fuzz-targets-on-pr
      - run-fuzz-campaign-nightly

commands:
  dependency-audit:
    - cargo audit
    - cargo deny check
    - osv-scanner --config osv-scanner.toml scan -L Cargo.lock
  secret-scanning:
    - gitleaks detect --source .
    - bash scripts/check-high-risk-patterns.sh
  supply-chain-artifacts:
    - cargo cyclonedx --format json --override-filename sbom
    - bash scripts/generate-attestation-placeholder.sh security-artifacts/attestation-placeholder.json
